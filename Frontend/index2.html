<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวร้านเสริมสวย</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="card">
        <h2>🗓️ จองคิวใช้บริการร้านเสริมสวย ✂</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label>ชื่อลูกค้า:</label>
                <input type="text" id="customer_name" required>
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์ (ใช้สำหรับเช็คสถานะ):</label>
                <input type="tel" id="phone_number" required>
            </div>
            <div class="form-group">
                <label>บริการที่ต้องการ:</label>
                <select id="service_id" required>
                    <option value="1">ตัดผมชาย (300 บาท)</option>
                    <option value="2">ตัดผมหญิง (500 บาท)</option>
                    <option value="3">ทำสีผม (1500 บาท)</option>
                </select>
            </div>
            <div class="form-group">
                <label>วันที่ต้องการนัด:</label>
                <input type="date" id="appointment_date" required>
            </div>
            <div class="form-group">
                <label>เวลา:</label>
                <input type="time" id="appointment_time" required>
            </div>
            <button type="submit">ยืนยันการจองคิว</button>
        </form>

        <a href="check.html" style="display:block; text-align:center; margin-top:20px; text-decoration:none; color:#0984E3; font-weight:500;">
            🔍 ตรวจสอบสถานะการจองคิวคลิกที่นี่
        </a>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/appointments';

        // ฟังก์ชันจองคิว
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const payload = {
                customer_name: document.getElementById('customer_name').value,
                phone_number: document.getElementById('phone_number').value,
                service_id: document.getElementById('service_id').value,
                appointment_date: document.getElementById('appointment_date').value,
                appointment_time: document.getElementById('appointment_time').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('🎉 จองคิวสำเร็จแล้ว!');
                    document.getElementById('bookingForm').reset();
                } else {
                    alert('เกิดข้อผิดพลาดในการจองคิว');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('ไม่สามารถเชื่อมต่อระบบได้');
            }
        });
    </script>
</body>
</html>
