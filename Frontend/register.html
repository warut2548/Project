<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก | Barber Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* =========================================
           RESET & BASE สำหรับหน้า Login/Register
        ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* =========================================
           SPLIT LAYOUT (แบ่งซ้าย-ขวา)
        ========================================= */
        .split-container {
            display: flex;
            min-height: 100vh;
        }

        /* ฝั่งซ้าย: รูปภาพและข้อความต้อนรับ */
        .left-side {
            flex: 1;
            position: relative;
            /* ใส่รูปภาพพื้นหลังแนว Barbershop */
            background: url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* เลเยอร์สีเขียวเข้มทับรูปภาพให้ดูแพง */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(10, 54, 34, 0.92) 0%, rgba(5, 26, 16, 0.98) 100%);
            z-index: 1;
        }

        .left-side .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .left-side h1 {
            font-size: 48px;
            color: #d4af37; /* สีทอง */
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .left-side p {
            font-size: 18px;
            line-height: 1.6;
            color: #cbd5e1;
            font-weight: 300;
        }

        /* ฝั่งขวา: ฟอร์มสมัครสมาชิก */
        .right-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .logo {
            width: 70px;
            display: block;
            margin: 0 auto 20px;
            /* ปรับสีไอคอนให้กลืนกับโทนสี */
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        .login-card h2 {
            color: #0a3622;
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* =========================================
           FORM STYLES
        ========================================= */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            border: 2px solid #e2e8f0;
            padding: 14px 15px;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Kanit', sans-serif;
            background: #f8fafc;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0a3622;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(10, 54, 34, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #0a3622;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #d4af37;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .register-text {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
        }

        .register-text a {
            color: #0a3622;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .register-text a:hover {
            color: #d4af37;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           RESPONSIVE (รองรับหน้าจอมือถือ)
        ========================================= */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .left-side {
                padding: 60px 20px;
                flex: none; /* ให้สูงตามเนื้อหา */
            }
            .left-side h1 {
                font-size: 36px;
            }
            .right-side {
                padding: 40px 20px;
                border-top-left-radius: 30px;
                border-top-right-radius: 30px;
                margin-top: -30px; /* ดึงขึ้นมาทับฝั่งซ้ายนิดนึงให้สวยๆ */
                position: relative;
                z-index: 3;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="left-side">
            <div class="overlay"></div>
            <div class="content">
                <h1>JOIN US</h1>
                <p>สมัครสมาชิกเพื่อรับสิทธิประโยชน์ <br> และจัดการการจองคิวของคุณได้ดียิ่งขึ้น</p>
            </div>
        </div>

        <div class="right-side">
            <div class="login-card">
                <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" alt="logo" class="logo">
                <h2>สร้างบัญชีใหม่</h2>
                
                <form id="registerForm">
                    <div class="input-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" id="full_name" placeholder="ชื่อของคุณ" required>
                    </div>

                    <div class="input-group">
                        <label>อีเมล (Email Address)</label>
                        <input type="email" id="email" placeholder="example@mail.com" required>
                    </div>

                    <div class="input-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" placeholder="08XXXXXXXX" required>
                    </div>

                    <div class="input-group">
                        <label>รหัสผ่าน (Password)</label>
                        <input type="password" id="password" placeholder="ตั้งรหัสผ่าน 6 ตัวขึ้นไป" required>
                    </div>
                    
                    <button type="submit" class="btn-login" id="regBtn">สมัครสมาชิก</button>
                    
                    <p class="register-text">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const regBtn = document.getElementById('regBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // แสดงสถานะการทำงาน
            regBtn.innerText = 'กำลังบันทึกข้อมูล...';
            regBtn.disabled = true;

            const userData = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value
            };

            try {
                // ยิงไปที่ API Register 
                const response = await axios.post('http://localhost:5000/register', userData);

                // ถ้าสำเร็จ
                alert(response.data.message || '🎉 สมัครสมาชิกสำเร็จ!');
                window.location.href = 'login.html';

            } catch (error) {
                // ถ้าผิดพลาด (เช่น อีเมลซ้ำ)
                const errorMsg = error.response ? error.response.data.error : 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
                alert('❌ ' + errorMsg);
                
                regBtn.innerText = 'สมัครสมาชิก';
                regBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
