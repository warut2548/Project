<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการจอง | Barber Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* สไตล์ของการ์ดประวัติการจอง */
        .appointment-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 6px solid #0b4e3d;}
        /* สีของสถานะต่างๆ */
        .status-Pending { color: #f39c12; font-weight: bold; } /* รอดำเนินการ */
        .status-Confirmed { color: #2ecc71; font-weight: bold; } /* ยืนยันแล้ว */
        .status-Cancelled { color: #e74c3c; font-weight: bold; } /* ยกเลิกแล้ว */
        
        .error-msg { color: #e74c3c; font-weight: bold; background: #fadbd8; padding: 15px; border-radius: 5px; border: 1px solid #e74c3c; text-align: center; }
        .user-badge { cursor: pointer; display: flex; align-items: center; background-color: #0b4e3d; color: white; padding: 8px 20px; border-radius: 30px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .user-badge:hover { background-color: #083b2e; }
        
        /* สไตล์ปุ่มกดในการ์ด */
        .btn-cancel { margin-top: 10px; padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: 'Kanit', sans-serif; transition: 0.3s; }
        .btn-cancel:hover { background: #c0392b; }
        .btn-edit { margin-top: 10px; margin-right: 5px; padding: 8px 15px; background: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: 'Kanit', sans-serif; transition: 0.3s; }
        .btn-edit:hover { background: #d68910; }
    </style>
</head>
<body class="dashboard-body">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>BARBER SHOP</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="services.html" class="nav-item">✂️ เลือกบริการ</a>
            <a href="check.html" class="nav-item active">🔍 เช็คสถานะคิว</a>
            <a href="#" class="nav-item logout" onclick="logout()">🚪 ออกจากระบบ</a>
        </nav>
    </div>

    <main class="main-content">
        <div style="display: flex; justify-content: flex-end; padding: 15px 20px 0; width: 100%; box-sizing: border-box;">
            <div class="user-badge" onclick="editName()">
                <span style="margin-right: 10px; font-size: 1.2rem;">👤</span>
                <span id="topbarUserName">กำลังโหลด...</span>
                <span style="margin-left: 10px; font-size: 0.8rem; opacity: 0.8;">✏️ แก้ไข</span>
            </div>
        </div>

        <div style="padding: 20px;">
            <h2>📋 รายการจองคิวของคุณ</h2>
            <div id="appointmentList">
                <p style="text-align:center; color:#888;">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </main>

    <script>
        // ดึง ID และชื่อของลูกค้ามาจากกระเป๋า localStorage
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName') || 'ลูกค้า';

        // 1. ฟังก์ชันนี้จะทำงานทันทีที่โครงสร้างหน้าเว็บโหลดเสร็จ
        document.addEventListener("DOMContentLoaded", () => {
            // เช็คว่ามี ID หรือไม่ ถ้าไม่มีให้เตะกลับไปหน้า login
            if (!userId || userId === "undefined" || userId === "null") {
                window.location.href = 'login.html';
                return;
            }
            // ใส่ชื่อลูกค้าที่มุมขวาบน
            document.getElementById('topbarUserName').innerText = userName;
            // สั่งให้ดึงข้อมูลคิวของลูกค้าคนนี้มาโชว์
            fetchAppointments();
        });

        // 2. ฟังก์ชันแก้ไขชื่อลูกค้า (ใช้ SweetAlert2 ทำกล่องกรอกข้อมูลสวยๆ)
        async function editName() {
            const currentName = document.getElementById('topbarUserName').innerText;
            // เรียกใช้ Swal.fire เพื่อสร้าง Popup ให้กรอกชื่อใหม่
            const { value: newName } = await Swal.fire({
                title: 'แก้ไขชื่อของคุณ',
                input: 'text',
                inputValue: currentName,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                inputValidator: (value) => {
                    if (!value) { return 'กรุณากรอกชื่อด้วยครับ!' }
                }
            });
            
            // ถ้ากรอกชื่อใหม่มาแล้วไม่ซ้ำกับของเดิม
            if (newName && newName.trim() !== "" && newName !== currentName) {
                try {
                    // ยิง API แบบ PUT ไปอัปเดตชื่อในฐานข้อมูล
                    await axios.put(`http://localhost:5000/users/${userId}`, { full_name: newName.trim() });
                    // อัปเดตชื่อใน localStorage และหน้าเว็บ
                    localStorage.setItem('userName', newName.trim()); 
                    document.getElementById('topbarUserName').innerText = newName.trim();
                    // แจ้งเตือนว่าสำเร็จ
                    Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'อัปเดตชื่อเรียบร้อยแล้วครับ 🎉', timer: 2000, showConfirmButton: false });
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถอัปเดตชื่อได้ครับ' });
                }
            }
        }

        // 3.ฟังก์ชันหลัก: ดึงข้อมูลคิวทั้งหมดมาแสดง
        async function fetchAppointments() {
            const listDiv = document.getElementById('appointmentList');
            try {
                // ยิง API แบบ GET ไปถามหลังบ้านว่าลูกค้าคนนี้มีคิวอะไรบ้าง
                const res = await axios.get(`http://localhost:5000/appointments/${userId}`);
                const appointments = res.data; // ได้ข้อมูลกลับมาเป็น Array (รายการ)
                
                // ถ้าไม่เคยจองคิวเลย ให้แสดงข้อความบอก
                if (!appointments || appointments.length === 0) {
                    listDiv.innerHTML = `<div style="text-align:center; padding:40px; color:#7f8c8d;"><span style="font-size: 3rem;">📅</span><p>คุณยังไม่มีประวัติการจองคิวครับ</p></div>`;
                    return;
                }

                // ถ้ามีคิว ให้เอาข้อมูลมาวนลูป (map) สร้างเป็นการ์ด HTML ทีละใบ
                listDiv.innerHTML = appointments.map(app => {
                    const statusColor = app.status || 'Pending';
                    const formattedDate = new Date(app.appointment_date).toISOString().split('T')[0]; 
                    
                    // สร้างปุ่ม เลื่อนคิว และ ยกเลิกคิว
                    // (มีเงื่อนไขว่า: จะโชว์ปุ่มก็ต่อเมื่อสถานะเป็น Pending (รอดำเนินการ) เท่านั้น!)
                    let actionButtons = '';
                    if (statusColor === 'Pending') {
                        actionButtons = `
                            <div style="margin-top: 15px;">
                                <button class="btn-edit" onclick="rescheduleAppointment(${app.id}, '${formattedDate}', '${app.appointment_time}')">✏️ เลื่อนคิว</button>
                                <button class="btn-cancel" onclick="cancelAppointment(${app.id})">❌ ยกเลิกคิวนี้</button>
                            </div>
                        `;
                    }

                    // คืนค่า HTML การ์ด 1 ใบเพื่อเอาไปแปะบนหน้าเว็บ
                    return `
                        <div class="appointment-card">
                            <h3 style="margin-top:0; color:#0b4e3d;">✂️ บริการ: ${app.service_name || 'ไม่ระบุ'}</h3>
                            <p><strong>📅 วันที่:</strong> ${new Date(app.appointment_date).toLocaleDateString('th-TH')}</p>
                            <p><strong>⏰ เวลา:</strong> ${app.appointment_time} น.</p>
                            <p><strong>📌 สถานะ:</strong> <span class="status-${statusColor}">${statusColor}</span></p>
                            ${actionButtons}
                        </div>
                    `;
                }).join(''); // เอาการ์ดทั้งหมดมาต่อกัน
                
            } catch (error) {
                // ถ้า API พังหรือยิงไม่ติด ให้ขึ้นข้อความ Error
                listDiv.innerHTML = `<div class="error-msg">❌ เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
            }
        }

        // 4. ฟังก์ชันเลื่อนคิว (แก้ไขวัน-เวลา)
        async function rescheduleAppointment(appointmentId, oldDate, oldTime) {
            // สร้าง Popup พร้อมฟอร์มให้เลือกวันและเวลาใหม่
            const { value: formValues } = await Swal.fire({
                title: '🗓️ เลื่อนคิว',
                html: `
                    <div style="text-align: left; margin-bottom: 10px;">
                        <label>เลือกวันที่ใหม่:</label>
                        <input id="swal-date" type="date" class="swal2-input" value="${oldDate}">
                    </div>
                    <div style="text-align: left;">
                        <label>เลือกเวลาใหม่:</label>
                        <input id="swal-time" type="time" class="swal2-input" value="${oldTime}">
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    // ดึงค่าวันที่และเวลาจากฟอร์มใน Popup
                    const newDate = document.getElementById('swal-date').value;
                    const newTime = document.getElementById('swal-time').value;
                    if (!newDate || !newTime) {
                        Swal.showValidationMessage('กรุณาเลือกวันและเวลาให้ครบถ้วน!');
                        return false;
                    }
                    return { date: newDate, time: newTime };
                }
            });

            // ถ้ากดบันทึก
            if (formValues) {
                try {
                    // ยิง API แบบ PUT ไปอัปเดตวันและเวลาใหม่ในฐานข้อมูล
                    await axios.put(`http://localhost:5000/appointments/${appointmentId}/reschedule`, {
                        appointment_date: formValues.date,
                        appointment_time: formValues.time
                    });
                    
                    Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'เลื่อนคิวเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                    // เลื่อนเสร็จ ให้ดึงข้อมูลมาแสดงใหม่ (รีเฟรชตาราง)
                    fetchAppointments(); 
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถเลื่อนคิวได้' });
                }
            }
        }

        // 5. ฟังก์ชันยกเลิกคิว
        async function cancelAppointment(appointmentId) {
            // โชว์ Popup ยืนยันว่าต้องการยกเลิกจริงๆ ใช่ไหม
            const result = await Swal.fire({
                title: 'ยืนยันการยกเลิก?',
                text: "คุณแน่ใจหรือไม่ว่าต้องการยกเลิกคิวนี้?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#95a5a6',
                confirmButtonText: 'ใช่, ยกเลิกเลย!',
                cancelButtonText: 'ปิด'
            });

            // ถ้ากด "ใช่, ยกเลิกเลย"
            if (result.isConfirmed) {
                try {
                    // ยิง API แบบ PUT ไปบอกหลังบ้านให้เปลี่ยนสถานะคิวเป็น Cancelled
                    await axios.put(`http://localhost:5000/appointments/${appointmentId}/cancel`);
                    Swal.fire({ icon: 'success', title: 'ยกเลิกสำเร็จ!', text: 'คิวของคุณถูกยกเลิกแล้ว', timer: 2000, showConfirmButton: false });
                    // ยกเลิกเสร็จ ให้ดึงข้อมูลมาแสดงใหม่ (รีเฟรชตาราง)
                    fetchAppointments();
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถยกเลิกคิวได้' });
                }
            }
        }

        // 6. ฟังก์ชันออกจากระบบ
        function logout() {
            // โชว์ Popup ถามเพื่อความแน่ใจ
            Swal.fire({
                title: 'ออกจากระบบ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0b4e3d',
                cancelButtonColor: '#e74c3c',
                confirmButtonText: 'ใช่, ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    // ล้างข้อมูลในlocalStorage และเด้งไปหน้า Login
                    localStorage.clear(); 
                    window.location.href = 'login.html'; 
                }
            });
        }
    </script>
</body>
</html>
