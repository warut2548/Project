<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการคิว | BARBER SHOP Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-color: #0b2e13; --text-color: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { display: flex; background: #f4f7f6; min-height: 100vh; }
        
        .sidebar { width: 260px; background: var(--sidebar-color); color: white; position: fixed; height: 100vh; padding: 25px; }
        .sidebar h2 { color: #f1c40f; text-align: center; margin-bottom: 30px; }
        .nav-item { display: block; padding: 12px; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 10px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: #f1c40f; }

        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a252f; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .pending { background: #fff8e1; color: #f39c12; }
        .confirmed { background: #e8f5e9; color: #2ecc71; }
        .cancelled { background: #fdeaea; color: #e74c3c; }

        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        [contenteditable="true"] { background: #fff9c4; outline: 2px solid #f1c40f; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>BARBER SHOP</h2>
        <a href="admin.html" class="nav-item active">📋 จัดการคิวลูกค้า</a>
        <a href="services.html" class="nav-item">🏠 กลับหน้าหลัก</a>
        <a href="login.html" class="nav-item" style="margin-top: 50px; color: #ff7675;">🚪 ออกจากระบบ</a>
    </div>

    <div class="main">
        <header style="margin-bottom: 30px;">
            <h1>รายการจองคิวทั้งหมด</h1>
            <p style="color: #666;">จัดการสถานะและข้อมูลเบอร์โทรลูกค้า</p>
        </header>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ชื่อลูกค้า</th>
                        <th>เบอร์โทร</th>
                        <th>บริการ</th>
                        <th>วันที่/เวลา</th>
                        <th>สถานะ</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="adminBookingTable">
                    <tr><td colspan="6" style="text-align:center; padding: 20px;">🔍 กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
